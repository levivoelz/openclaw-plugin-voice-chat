<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voice Chat — Settings</title>
  <link rel="stylesheet" href="./settings.css" />
</head>
<body>
  <div id="root">
    <header>
      <h1>Voice Chat Settings</h1>
      <button id="save-btn" class="btn btn--primary">Save</button>
    </header>

    <!-- STT -->
    <section id="s-stt">
      <h2>Speech-to-Text</h2>
      <div class="field-row">
        <label for="stt-provider">Provider</label>
        <select id="stt-provider"></select>
      </div>
      <div class="field-row">
        <label for="stt-model">Model</label>
        <select id="stt-model"></select>
      </div>
      <div class="field-row">
        <label for="stt-lang">Language <span class="hint">(optional)</span></label>
        <input id="stt-lang" type="text" placeholder="en" />
      </div>
      <div class="field-row field-row--action">
        <button id="test-mic-btn" class="btn">Test Mic</button>
        <span id="test-mic-result" class="hint"></span>
      </div>
    </section>

    <!-- TTS -->
    <section id="s-tts">
      <h2>Text-to-Speech</h2>
      <div class="field-row">
        <label for="tts-provider">Provider</label>
        <select id="tts-provider"></select>
      </div>
      <div class="field-row">
        <label for="tts-model">Model</label>
        <select id="tts-model"></select>
      </div>
      <div class="field-row">
        <label for="tts-voice">Voice</label>
        <select id="tts-voice"></select>
      </div>
      <div class="field-row field-row--action">
        <button id="preview-tts-btn" class="btn">Preview</button>
        <span id="preview-tts-result" class="hint"></span>
      </div>
    </section>

    <!-- Mode -->
    <section id="s-mode">
      <h2>Capture Mode</h2>
      <div class="field-row">
        <fieldset>
          <legend class="sr-only">Capture mode</legend>
          <label><input type="radio" name="capture-mode" value="ptt" checked /> Push to Talk — hold mic button or Spacebar</label>
          <label><input type="radio" name="capture-mode" value="vad" /> Voice Activity Detection — auto-detects speech</label>
        </fieldset>
      </div>
      <div class="field-row">
        <label class="checkbox-row">
          <input type="checkbox" id="interrupt-toggle" checked />
          Interrupt TTS when you speak
        </label>
      </div>
    </section>

    <!-- Per-agent overrides -->
    <section id="s-peragent">
      <h2>Per-agent Overrides</h2>
      <table id="agent-table">
        <thead>
          <tr><th>Agent ID</th><th>STT provider</th><th>TTS provider</th><th></th></tr>
        </thead>
        <tbody id="agent-tbody"></tbody>
      </table>
      <button id="add-agent-btn" class="btn">+ Add override</button>
    </section>

    <!-- Provider keys -->
    <section id="s-keys">
      <h2>Provider Keys</h2>
      <div class="hint">Keys are stored in <code>openclaw.json</code> on the server. Saving here sends them via POST to the gateway.</div>
      <div id="key-fields"></div>
    </section>

    <!-- Phone access -->
    <section id="s-phone">
      <h2>Phone Access</h2>
      <div id="tunnel-status" class="tunnel-badge"></div>
      <div id="phone-url-row" class="field-row">
        <label for="phone-url">Panel URL</label>
        <input id="phone-url" type="text" readonly />
        <button id="copy-url-btn" class="btn">Copy</button>
      </div>
      <div id="qr-wrap"></div>
    </section>

    <!-- Diagnostics -->
    <section id="s-diag">
      <h2>Diagnostics</h2>
      <button id="run-diag-btn" class="btn">Run full round-trip test</button>
      <pre id="diag-output"></pre>
    </section>
  </div>

  <script type="module" src="./settings.js"></script>
</body>
</html>
